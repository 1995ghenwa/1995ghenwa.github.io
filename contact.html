    <!-- Contact Section -->
    <section class="contact" id="contactme">
      <h2>How to communicate</h2>
      <div class="box">
        <div class="form-card">
          <h3>If you have a question</h3>
          <form action="https://formspree.io/f/xdapdykz" method="POST">
            <div class="form-group">
              <label for="username">
                <i class="fa-solid fa-user"></i> Name
              </label>
              <input type="text" name="username" id="username" placeholder="Your name" required>
            </div>

            <div class="form-group">
              <label for="useremail">
                <i class="fa-regular fa-envelope"></i> Email
              </label>
              <input type="email" name="useremail" id="useremail" placeholder="Your email" required>
            </div>

            <div class="form-group">
              <label for="message">
                <i class="fa-solid fa-message"></i> Message
              </label>
              <textarea name="message" id="message" cols="30" rows="4" placeholder="Tell me something" required></textarea>
            </div>

            <button type="submit">Send Message</button>
          </form>
        </div>
      </div>
